app = "sync-relay-q5gzcq"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  DB_PATH = "/data/relay.db"
  RELAY_URL = "wss://sync-relay-q5gzcq.fly.dev"

[mounts]
  source = "relay_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/"
