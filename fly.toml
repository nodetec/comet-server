app = "comet-server"
primary_region = "ewr"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3000"
  RELAY_URL = "wss://comet.md"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 2
